      - $ref: "#/components/parameters/applicationId"
      - $ref: "#/components/parameters/campaignId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCouponBatch"
        description: body
        required: true
      responses:
        "204":
          description: No Content
      summary: Update coupons
      tags:
      - management
