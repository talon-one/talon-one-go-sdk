      operationId: getApplicationSessions
      parameters:
      - $ref: "#/components/parameters/pageSize"
      - $ref: "#/components/parameters/skip"
      - $ref: "#/components/parameters/sort"
      - description: |-
          Enables partial matching for a single text search field. When enabled, the search term matches anywhere within the field value (case-insensitive). Minimum 3 characters required for partial matches; shorter inputs automatically fall back to exact match.

          **Note:** Use with one of: `integrationId`, `profile`, `coupon`, `referral`, or `storeIntegrationId`.
        explode: true
        in: query
        name: partialMatch
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "Filter by sessions with this profile integration ID. By default,\
          \ requires exact match. Use `partialMatch=true` to search for partial matches\
          \ (minimum 3 characters)."
        explode: true
        in: query
        name: profile
        required: false
        schema:
          type: string
        style: form
      - description: Filter by sessions with this state. Must be exact match.
        explode: true
        in: query
        name: state
        required: false
        schema:
          enum:
          - open
          - closed
          - partially_returned
          - cancelled
          type: string
        style: form
      - description: Only return events created before this date. You can use any
          time zone setting. Talon.One will convert to UTC internally.
        explode: true
        in: query
        name: createdBefore
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Only return events created after this date. You can use any time
          zone setting. Talon.One will convert to UTC internally.
        explode: true
        in: query
        name: createdAfter
        required: false
        schema:
