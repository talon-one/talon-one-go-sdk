    CouponCreationJob:
      allOf:
      - $ref: "#/components/schemas/Entity"
      - $ref: "#/components/schemas/CampaignEntity"
      - $ref: "#/components/schemas/ApplicationEntity"
      - $ref: "#/components/schemas/AccountEntity"
      - $ref: "#/components/schemas/NewCouponCreationJob"
      - properties:
          batchId:
            description: The batch ID coupons created by this job will bear.
            example: tqyrgahe
            title: Batch ID
            type: string
          status:
            description: |
              The current status of this request. Possible values:
              - `pending verification`
              - `pending`
              - `completed`
              - `failed`
              - `coupon pattern full`
            example: pending
            title: Job Status
            type: string
          createdAmount:
            description: The number of coupon codes that were already created for
              this request.
            example: 1000000
            format: int64
            title: Created Amount
            type: integer
          failCount:
            description: The number of times this job failed.
            example: 10
            format: int64
            title: Fail Count
            type: integer
          errors:
            description: An array of individual problems encountered during the request.
            example:
            - Connection to database was reset
            - failed to generate enough unique codes
            - attribute 'PizzaLover' not found on entity 'Coupons'
            items:
              type: string
            title: Errors
            type: array
            default: null
          createdBy:
            description: ID of the user who created this effect.
            example: 1
            format: int64
            title: Created By
            type: integer
          communicated:
            description: Whether or not the user that created this job was notified
              of its final state.
            example: false
            type: boolean
          chunkExecutionCount:
            description: The number of times an attempt to create a chunk of coupons
              was made during the processing of the job.
            example: 0
            format: int64
            title: Iterations
            type: integer
          chunkSize:
            description: The number of coupons that will be created in a single transactions.
              Coupons will be created in chunks until arriving at the requested amount.
            example: 20000
            format: int64
            title: Chunk size
            type: integer
        required:
        - attributes
        - batchId
        - chunkExecutionCount
        - communicated
        - createdAmount
        - createdBy
        - errors
        - failCount
        - requestedAmount
        - status
        - usageLimit
    CouponDeletionJob:
      allOf:
      - $ref: "#/components/schemas/Entity"
      - $ref: "#/components/schemas/ApplicationEntity"
      - $ref: "#/components/schemas/AccountEntity"
      - $ref: "#/components/schemas/NewCouponDeletionJob"
      - properties:
          status:
            description: |
              The current status of this request. Possible values:
              - `not_ready`
              - `pending`
              - `completed`
              - `failed`
            example: pending
            title: Job Status
            type: string
          deletedAmount:
            description: The number of coupon codes that were already deleted for
              this request.
            example: 1000000
            format: int64
            title: Deleted Amount
            type: integer
          failCount:
            description: The number of times this job failed.
            example: 10
            format: int64
            title: Fail Count
            type: integer
          errors:
            description: An array of individual problems encountered during the request.
            example:
            - Connection to database was reset
            - failed to delete codes
            items:
              type: string
            title: Errors
            type: array
            default: null
          createdBy:
            description: ID of the user who created this effect.
            example: 1
            format: int64
            title: Created By
            type: integer
          communicated:
            description: Indicates whether the user that created this job was notified
              of its final state.
            example: false
            type: boolean
          campaignIDs:
            items:
              format: int64
              title: Campaign ID
              type: integer
            type: array
            default: null
        required:
        - communicated
        - createdBy
        - errors
        - failCount
        - status
