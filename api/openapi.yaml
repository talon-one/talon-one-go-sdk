        explode: true
        in: query
        name: recipientIntegrationId
        required: false
        schema:
          type: string
        style: form
      - description: Filter results to an exact case-insensitive matching against
          the coupon code
        explode: true
        in: query
        name: exactMatch
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "204":
          description: No Content
