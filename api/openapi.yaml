            - string
            - number
            - boolean
            - time
            - (list string)
            - (list number)
            - (list time)
            - location
            - (list location)
            example: string
            type: string
          description:
            description: A description of this attribute.
            example: Event triggered when a customer displays a page.
            type: string
          suggestions:
