          characters.
        explode: true
        in: query
        name: value
        required: false
        schema:
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon creation timestamp. You can\
          \ use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: createdBefore
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon creation timestamp. You can\
          \ use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: createdAfter
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon start date timestamp. You can\
          \ use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: startsAfter
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon start date timestamp. You can\
          \ use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: startsBefore
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon expiration date timestamp.\
          \ You can use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: expiresAfter
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the coupon expiration date timestamp.\
          \ You can use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: expiresBefore
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          - `expired`: Matches coupons in which the expiration date is set and in the past.
          - `validNow`: Matches coupons in which start date is null or in the past and expiration date is null or in the future.
          - `validFuture`: Matches coupons in which start date is set and in the future.
        explode: true
        in: query
        name: valid
        required: false
        schema:
          enum:
          - expired
          - validNow
          - validFuture
          type: string
        style: form
      - description: Filter results by batches of coupons
        explode: true
        in: query
        name: batchId
        required: false
        schema:
          type: string
        style: form
      - description: |
          - `true`: only coupons where `usageCounter < usageLimit` will be returned.
          - `false`: only coupons where `usageCounter >= usageLimit` will be returned.
        explode: true
        in: query
        name: usable
        required: false
        schema:
          enum:
          - "true"
          - "false"
          type: string
        style: form
      - description: Filter the results by matching them with the ID of a referral.
          This filter shows the coupons created by redeeming a referral code.
        explode: true
        in: query
        name: referralId
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: |
