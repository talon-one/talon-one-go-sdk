        validFrom:
          description: |
            Timestamp at which the strikethrough pricing update becomes valid. Set for **scheduled** strikethrough pricing updates (version: v2) only.
          example: 2021-07-20T22:00:00Z
          format: date-time
          type: string
        applicationId:
          description: The ID of the Application to which the catalog items labels
            belongs.
          example: 322
          format: int64
          type: integer
        currentBatch:
          description: The batch number of the notification. Notifications might be
            sent in different batches.
          example: 1
          format: int64
          type: integer
