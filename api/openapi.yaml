    LoyaltyProgramTransaction:
      example:
        id: 123
        transactionUUID: ce59f12a-f53b-4014-a745-636d93f2bd3f
        programId: 324
        campaignId: 324
        created: 2022-01-02T15:04:05Z07:00
        type: addition
        amount: 10.25
        name: Reward 50 points for each $500 purchase
        startDate: 2022-01-02T15:04:05Z07:00
        expiryDate: 2022-01-02T15:04:05Z07:00
        customerProfileId: kda0fajs0-fad9f-fd9dfsa9-fd9dasjf9
        cardIdentifier: summer-loyalty-card-0543
        subledgerId: sub-123
        customerSessionId: 05c2da0d-48fa-4aa1-b629-898f58f1584d
        importId: 4
        userId: 5
        userEmail: john.doe@example.com
        rulesetId: 11
        ruleName: 10 points for every $100 spent
        flags: ""
        validityDuration: 30D
      properties:
        id:
          description: ID of the loyalty ledger transaction.
          example: 123
          format: int64
          type: integer
        transactionUUID:
          description: Unique identifier of the transaction in the UUID format.
          example: ce59f12a-f53b-4014-a745-636d93f2bd3f
          type: string
        programId:
          description: ID of the loyalty program.
          example: 324
          format: int64
          type: integer
        campaignId:
          description: ID of the campaign.
          example: 324
          format: int64
          type: integer
        created:
          description: Date and time the loyalty transaction occurred.
          example: 2022-01-02T15:04:05Z07:00
          format: date-time
          type: string
        type:
          description: |
            Type of transaction. Possible values:
              - `addition`: Signifies added points.
              - `subtraction`: Signifies deducted points.
          enum:
          - addition
          - subtraction
          example: addition
          maxLength: 255
          type: string
        amount:
          description: Amount of loyalty points added or deducted in the transaction.
          example: 10.25
          type: number
        name:
          description: Name or reason for the loyalty ledger transaction.
          example: Reward 50 points for each $500 purchase
          maxLength: 255
          type: string
        startDate:
          description: |
            When points become active. Possible values:
              - `immediate`: Points are immediately active.
              - `on_action`: Points become active based on the customer's action.
              - a timestamp value: Points become active at a given date and time.
          example: 2022-01-02T15:04:05Z07:00
          maxLength: 64
          type: string
        expiryDate:
          description: |
            When points expire. Possible values:
              - `unlimited`: Points have no expiration date.
              - a timestamp value: Points expire at a given date and time.
          example: 2022-01-02T15:04:05Z07:00
          type: string
        customerProfileId:
          description: Customer profile integration ID used in the loyalty program.
          example: kda0fajs0-fad9f-fd9dfsa9-fd9dasjf9
          maxLength: 255
          type: string
        cardIdentifier:
          description: |
            The identifier of the loyalty card, which must match the regular expression `^[A-Za-z0-9._%+@-]+$`.
          example: summer-loyalty-card-0543
          maxLength: 108
          minLength: 4
          pattern: "^[A-Za-z0-9._%+@-]+$"
          type: string
        subledgerId:
          description: ID of the subledger.
          example: sub-123
          maxLength: 64
          type: string
        customerSessionId:
          description: ID of the customer session where the transaction occurred.
          example: 05c2da0d-48fa-4aa1-b629-898f58f1584d
          maxLength: 255
          type: string
        importId:
          description: ID of the import where the transaction occurred.
          example: 4
          format: int64
          type: integer
        userId:
          description: ID of the user who manually added or deducted points. Applies
            only to manual transactions.
          example: 5
          format: int64
          type: integer
        userEmail:
          description: The email of the Campaign Manager account that manually added
            or deducted points. Applies only to manual transactions.
          example: john.doe@example.com
          type: string
        rulesetId:
          description: ID of the ruleset containing the rule that triggered the effect.
            Applies only for transactions that resulted from a customer session.
          example: 11
          format: int64
          type: integer
        ruleName:
          description: Name of the rule that triggered the effect. Applies only for
            transactions that resulted from a customer session.
          example: 10 points for every $100 spent
          type: string
        flags:
          allOf:
          - $ref: "#/components/schemas/LoyaltyLedgerEntryFlags"
          description: "The flags of the transaction, when applicable. The `createsNegativeBalance`\
            \  flag indicates whether the transaction results in a negative balance."
        validityDuration:
          description: |
            The duration for which the points remain active, relative to the  activation date.

            **Note**: This only applies to points for which `awaitsActivation` is `true` and `expiryDate` is not set.
          example: 30D
          type: string
      required:
      - amount
      - created
      - expiryDate
      - id
      - name
      - programId
      - startDate
      - subledgerId
      - transactionUUID
      - type
