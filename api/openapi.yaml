            type: string
          old:
            $ref: "#/components/schemas/IntegrationCampaignBase_allOf_attributes"
          new:
            $ref: "#/components/schemas/IntegrationCampaignBase_allOf_attributes"
          managementKeyId:
            description: ID of management key used to perform changes.
