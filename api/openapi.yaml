      - properties:
          name:
            description: The name of the variant.
            example: Variant A
            maxLength: 255
            minLength: 1
            type: string
        required:
        - name
    ExperimentCampaignCopy:
      properties:
        name:
          description: Name of the copied campaign (Defaults to "Copy of original
            campaign name").
          example: Copy of Summer promotions
          type: string
        description:
          description: A detailed description of the campaign.
          example: Campaign for all summer 2021 promotions
          title: Campaign Description
          type: string
        startTime:
          description: Timestamp when the campaign will become active.
          example: 2021-06-01T09:00:27.993483Z
          format: date-time
          type: string
        endTime:
          description: Timestamp when the campaign will become inactive.
          example: 2021-09-10T01:00:00.993483Z
          format: date-time
          type: string
        tags:
          description: A list of tags for the campaign.
          example:
          - Summer
          - Shoes
          items:
            maxLength: 50
            minLength: 1
            type: string
          maxItems: 50
          type: array
          default: null
        evaluationGroupId:
          description: The ID of the campaign evaluation group the campaign belongs
            to.
          example: 2
          format: int64
          type: integer
    ExperimentCopy:
      properties:
        targetApplicationId:
          description: |
            The ID of the Application to copy the experiment. It is displayed in your Talon.One deployment URL.
          format: int64
          type: integer
        experiment:
          $ref: "#/components/schemas/ExperimentCopy_experiment"
      required:
      - experiment
      - targetApplicationId
    PromoteExperiment:
      properties:
        targetApplicationId:
          description: |
            The ID of the Application to copy the experiment. It is displayed in your Talon.One deployment URL.
          format: int64
          type: integer
        variantId:
          description: |
            The ID of the Experiment Variant to build the new campaign.
          format: int64
          type: integer
        disableExperiment:
          description: |
            Force disable the experiment.
          type: boolean
        campaign:
          $ref: "#/components/schemas/ExperimentCampaignCopy"
      required:
      - campaign
      - targetApplicationId
      - variantId
    ExperimentVerdict:
      properties:
        winnerVariantName:
          description: "The name of the winning variant. If no variant shows a statistically\
            \ significant advantage on key business metrics, return 'Inconclusive'."
          type: string
        verdictSummary:
          description: "A one-sentence summary of the outcome, including the key metric\
            \ and confidence level that led to the decision."
          type: string
        keyFindings:
          description: "A bullet point stating the most important finding, including\
            \ the metric, the percentage change, and the confidence."
          items:
            type: string
          type: array
          default: null
        aiConfidenceLevel:
          description: "Your confidence in this overall verdict, from 0 to 100."
          type: string
        recommendation:
          description: "A short, actionable recommendation based on the findings.\
            \ If inconclusive, suggest running the test longer. If there is a clear\
            \ winner, recommend promoting it."
          type: string
      required:
      - aiConfidenceLevel
      - keyFindings
      - recommendation
      - verdictSummary
      - winnerVariantName
    ExperimentVerdictResponse:
      properties:
        verdict:
          $ref: "#/components/schemas/ExperimentVerdict"
        generated:
          description: Timestamp of the moment when the verdict was generated.
          format: date-time
          type: string
      required:
      - generated
      - verdict
    ExperimentSegmentInsightVariant:
      properties:
        variantId:
          description: The ID of the experiment variant.
          example: 41
          format: int64
          type: integer
        variantName:
          description: The name of the experiment variant.
          example: Control
          type: string
        sessionsCount:
          description: The number of sessions in this segment for this variant.
          example: 161
          format: int64
          type: integer
        value:
          description: The metric value for this variant in the segment.
          example: 13.13
          format: double
          type: number
      required:
      - sessionsCount
      - value
      - variantId
      - variantName
    ExperimentSegmentInsight:
      properties:
        dimension:
          description: The segmentation dimension used to group customers or purchases
            for analysis.
          enum:
          - cart_value
          - item_count
          - customer_type
          example: cart_value
          type: string
        bucket:
          description: The specific group within the segmentation dimension.
          enum:
          - low
          - medium
          - high
          - new
          - returning
          - loyal
          example: high
          type: string
        confidence:
          description: |
            The raw (unadjusted) confidence score expressed as a percentage. Only segments with a confidence score greater than or equal to 95% are returned.
          example: 99.2
          format: double
          maximum: 100
          minimum: 95
          type: number
        winnerVariantId:
          description: The ID of the variant that performed better in this segment.
          example: 42
          format: int64
          type: integer
        variants:
          description: Per-variant metric values for this segment.
          items:
            $ref: "#/components/schemas/ExperimentSegmentInsightVariant"
          type: array
          default: null
      required:
      - bucket
      - confidence
      - dimension
      - variants
      - winnerVariantId
    ExperimentSegmentInsightMetric:
      properties:
        metric:
          description: The metric being measured.
          enum:
          - avg_session_value
          - avg_discounted_session_value
          - avg_items_per_session
          example: avg_session_value
          type: string
        segments:
          description: |
            Segments with statistically significant results for this metric. An empty array means no significant segments were found. Segments are sorted by confidence score from highest to lowest.
          items:
            $ref: "#/components/schemas/ExperimentSegmentInsight"
          type: array
          default: null
      required:
      - metric
      - segments
    ExperimentSegmentInsights:
      properties:
        metrics:
          description: |
            Segment insights grouped by metric. This array always contains exactly three metric objects. Each metric includes a segments array, which is empty if no significant results were found. The metrics array itself is empty if the `reason` property is populated.
          items:
            $ref: "#/components/schemas/ExperimentSegmentInsightMetric"
          type: array
          default: null
        totalSegmentsTested:
          description: |
            Total number of segment-metric combinations that were tested for statistical significance.
          example: 24
          format: int64
          type: integer
        dimensionsTested:
          description: |
            Number of segmentation dimensions that had sufficient data variance to test. Dimensions where all sessions fall into a single bucket are excluded.
          example: 3
          format: int64
          type: integer
        reason:
          description: |
            Empty string when segment insights are available. Contains a reason code when insights could not be computed (e.g., "insufficient_data" when the experiment has fewer than 100 sessions per variant).
          example: ""
          type: string
      required:
      - dimensionsTested
      - metrics
      - reason
      - totalSegmentsTested
    ExperimentConfidenceTimelineDataPoint:
      properties:
        date:
          description: The date-time this data point represents.
          example: 2024-01-15T00:00:00+07:00
          format: date-time
          type: string
        confidence:
          $ref: "#/components/schemas/ExperimentVariantResultConfidence"
      required:
      - confidence
      - date
    ExperimentConfidenceTimeline:
