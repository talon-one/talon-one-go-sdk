    BestPriorPriceRequest:
      example:
        skus:
        - SKU1241028
        - SKU7345278
        timeframeEndDate: 2020-11-10T23:00:00Z
        timeframe: "30"
        timeframeEndDateType: sale
        target:
          targetType: AUDIENCE
          audienceID: 4
      properties:
        skus:
          description: List of product SKUs to check when determining the best prior
            price.
          example:
          - SKU1241028
          - SKU7345278
          items:
            type: string
          minItems: 1
          type: array
          default: null
        timeframeEndDate:
          description: The end date and time that defines the latest time for retrieving
            historical SKU prices.
          example: 2020-11-10T23:00:00Z
          format: date-time
          type: string
        timeframe:
          description: The number of days prior to the timeframeEndDate. Only prices
            within this look back period are considered for the best prior price evaluation.
          example: "30"
          type: string
        timeframeEndDateType:
          description: |
            Sets the timeframe for retrieving historical pricing data. Can be one of the following values:
            - `strict`: The timeframe ends at the `timeframeEndDate` value.
            - `price`: The timeframe ends at the start of current price value and takes the prices prior to the start of the current price value into account.
            - `sale`:  The timeframe ends at the start of current `contextId` and takes the prices prior to the start of the `contextId` into account.
          enum:
          - strict
          - price
          - sale
          example: sale
          type: string
        target:
          $ref: "#/components/schemas/BestPriorTarget"
      required:
      - skus
      - timeframe
      - timeframeEndDate
      - timeframeEndDateType
