      tags:
      - management
    post:
      description: "Create coupons according to some pattern. Up to 20.000 coupons\
        \ can be created without a unique prefix. When a unique prefix is provided,\
        \ up to 200.000 coupons can be created."
      operationId: createCoupons
      parameters:
      - description: |
          Possible values: `yes` or `no`.
          - `yes`: Increases the performance of the API call by returning a 204 response.
          - `no`: Returns a 200 response that contains the updated customer profiles.
        explode: true
        in: query
        name: silent
        required: false
        schema:
          default: "yes"
          type: string
        style: form
      - $ref: "#/components/parameters/applicationId"
      - $ref: "#/components/parameters/campaignId"
