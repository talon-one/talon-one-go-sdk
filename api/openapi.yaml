          type: integer
    IntegrationRequest:
      description: "The body of a V2 integration API request (customer session update).\
        \ Next to the customer session details, this contains an optional listing\
        \ of extra properties that should be returned in the response."
      example:
        customerSession: ""
        responseContent:
        - customerSession
        - customerProfile
      properties:
        customerSession:
          allOf:
          - $ref: "#/components/schemas/NewCustomerSessionV2"
          description: The customer session update details.
        responseContent:
          description: |
            Extends the response with the chosen data entities. Use this property to get as much data
            as you need in one _Update customer session_ request instead of sending extra requests to other endpoints.

            **Note:** To retrieve loyalty card details, your request must include a loyalty card ID.
          example:
          - customerSession
          - customerProfile
          items:
            enum:
            - customerSession
            - customerProfile
            - coupons
            - triggeredCampaigns
            - referral
            - loyalty
            - event
            - awardedGiveaways
            - ruleFailureReasons
            - previousReturns
            - campaignEligibility
            - achievements
            type: string
          type: array
          default: null
      required:
      - customerSession
