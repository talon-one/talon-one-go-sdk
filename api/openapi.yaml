            description: A list of the IDs of the applications that are subscribed
              to this additional cost.
            example:
            - 3
            - 13
            items:
              format: int64
              type: integer
            type: array
            default: null
          type:
            default: session
            description: |
              The type of additional cost. Possible value:
              - `session`: Additional cost will be added per session.
              - `item`: Additional cost will be added per item.
              - `both`: Additional cost will be added per item and session.
            enum:
            - session
            - item
            - both
            example: session
            type: string
        required:
        - description
        - name
        - title
