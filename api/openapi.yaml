        schema:
          type: boolean
        style: form
      - description: Set to `true` to include loyalty information in the response.
        explode: true
        in: query
        name: loyalty
        required: false
        schema:
          type: boolean
        style: form
      - description: Set to `true` to include giveaways information in the response.
        explode: true
        in: query
        name: giveaways
