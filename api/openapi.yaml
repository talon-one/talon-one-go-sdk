          default: null
        reevaluateOnReturn:
          description: Indicates whether this campaign should be reevaluated when
            a customer returns an item.
          example: true
          title: Reevaluate on return
          type: boolean
        features:
          description: A list of features for the campaign.
          example:
          - coupons
          - loyalty
