            type: array
            default: null
          onError:
            additionalProperties:
              items:
                $ref: "#/components/schemas/PromotionBlock"
            description: Named error handlers evaluated when a specific error occurs.
        required:
        - blocks
        - operator
        title: PromotionGroupBlock
