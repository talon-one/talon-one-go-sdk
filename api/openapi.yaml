      properties:
        variantId:
          description: The ID of the variant.
          example: 1
          format: int64
          type: integer
        variantName:
          description: The name of the variant.
          example: Variant A
          type: string
        variantWeight:
          description: The weight of the variant.
          example: 50
          format: int64
          type: integer
        isWinner:
          description: Calculated flag if the variant is the winner.
          example: true
