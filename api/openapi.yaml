          \ match. Use `partialMatch=true` to search for partial matches (minimum\
          \ 3 characters)."
        explode: true
        in: query
        name: coupon
        required: false
        schema:
          type: string
        style: form
      - description: "Filter by sessions with this referral. By default, requires\
          \ exact match. Use `partialMatch=true` to search for partial matches (minimum\
          \ 3 characters)."
        explode: true
        in: query
        name: referral
        required: false
        schema:
          type: string
        style: form
      - description: "Filter by sessions with this integration ID. By default, requires\
          \ exact match. Use `partialMatch=true` to search for partial matches (minimum\
          \ 3 characters)."
        explode: true
        in: query
        name: integrationId
        required: false
        schema:
          type: string
        style: form
      - description: "The integration ID of the store. You choose this ID when you\
          \ create a store. By default, requires exact match. Use `partialMatch=true`\
          \ to search for partial matches (minimum 3 characters)."
        explode: true
        in: query
        name: storeIntegrationId
        required: false
        schema:
          type: string
        style: form
