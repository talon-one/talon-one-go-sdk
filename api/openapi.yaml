    CouponDeletionFilters:
      example:
        createdBefore: 2000-01-23T04:56:07.000+00:00
        createdAfter: 2000-01-23T04:56:07.000+00:00
        startsAfter: 2000-01-23T04:56:07.000+00:00
        startsBefore: 2000-01-23T04:56:07.000+00:00
        valid: expired
        usable: true
        redeemed: true
        recipientIntegrationId: recipientIntegrationId
        exactMatch: false
        value: value
        batchId: batchId
        referralId: 0
        expiresAfter: 2000-01-23T04:56:07.000+00:00
        expiresBefore: 2000-01-23T04:56:07.000+00:00
      properties:
        createdBefore:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
        createdAfter:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
        startsAfter:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
        startsBefore:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
        valid:
          description: |
            - `expired`: Matches coupons in which the expiration date is set and in the past.
            - `validNow`: Matches coupons in which the start date is null or in the past and the expiration date is null or in the future.
            - `validFuture`: Matches coupons in which the start date is set and in the future.
          enum:
          - expired
          - validNow
          - validFuture
          type: string
        usable:
          description: |
            - `true`: only coupons where `usageCounter < usageLimit` will be returned.
            - `false`: only coupons where `usageCounter >= usageLimit` will be returned.
            - This field cannot be used in conjunction with the `usable` query parameter.
          type: boolean
        redeemed:
          description: |
            - `true`: only coupons where `usageCounter > 0` will be returned.
            - `false`: only coupons where `usageCounter = 0` will be returned.

            **Note:** This field cannot be used in conjunction with the `usable` query parameter.
          type: boolean
        recipientIntegrationId:
          description: |
            Filter results by match with a profile id specified in the coupon's `RecipientIntegrationId` field.
          type: string
        exactMatch:
          default: false
          description: Filter results to an exact case-insensitive matching against
            the coupon code
          type: boolean
        value:
          description: Filter results by the coupon code
          type: string
        batchId:
          description: Filter results by batches of coupons
          type: string
        referralId:
          description: Filter the results by matching them with the ID of a referral.
            This filter shows the coupons created by redeeming a referral code.
          format: int64
          type: integer
        expiresAfter:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
        expiresBefore:
          description: "Filter results comparing the parameter value, expected to\
            \ be an RFC3339 timestamp string, to the coupon creation timestamp. You\
            \ can use any time zone setting. Talon.One will convert to UTC internally."
          format: date-time
          type: string
