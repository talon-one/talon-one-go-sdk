      allOf:
      - properties:
          name:
            description: The internal name used in API requests.
            example: shippingFee
            pattern: "^[A-Za-z]\\w*$"
            type: string
          title:
            description: "The human-readable name for the additional cost that will\
              \ be shown in the Campaign Manager. Like `name`, the combination of\
              \ entity and title must also be unique."
            example: Shipping fee
            pattern: "^[A-Za-z][A-Za-z0-9_.!~*'() -]*$"
            type: string
          description:
            description: A description of this additional cost.
            example: A shipping fee
            type: string
