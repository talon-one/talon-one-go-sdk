    ReturnIntegrationRequest:
      description: "The body of a return integration API request. Next to the cart\
        \ items details, this contains an optional listing of extra properties that\
        \ should be returned in the response."
      example:
        return: ""
        responseContent:
        - customerSession
        - customerProfile
      properties:
        return:
          allOf:
          - $ref: "#/components/schemas/NewReturn"
          description: The returned cart items details.
        responseContent:
          description: |
            Extends the response with the chosen data entities. Use this property to get as much data
            as you need in one _Update customer session_ request instead of sending extra requests to other endpoints.
          example:
          - customerSession
          - customerProfile
          items:
            enum:
            - customerSession
            - customerProfile
            - coupons
            - triggeredCampaigns
            - referral
            - loyalty
            - event
            - previousReturns
            type: string
          type: array
          default: null
      required:
      - return
