      - status
    LoyaltyCardProfileRegistration:
      example:
        integrationId: R195412
        timestamp: 2021-09-12T10:12:42Z
      properties:
        integrationId:
          description: Integration ID of the customer profile linked to the card.
          example: R195412
          maxLength: 1000
          type: string
        timestamp:
