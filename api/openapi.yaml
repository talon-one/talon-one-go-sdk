      - description: "Filter results comparing the parameter value, expected to be\
          \ an RFC3339 timestamp string, to the change creation timestamp. You can\
          \ use any time zone setting. Talon.One will convert to UTC internally."
        explode: true
        in: query
        name: createdAfter
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          When this flag is set, the result includes the total number of results for this query. This might decrease performance on large data sets.

          - When `true`: `totalResultSize` contains the total number of results for this query.
          - When `false`: Only `hasMore` is returned, and it is set to `true` when there are more results than shown on the page.
        explode: true
        in: query
        name: withTotalResultSize
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter results that match the given management key ID.
        explode: true
        in: query
        name: managementKeyId
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: "When this flag is set to false, the state without the change\
          \ will not be returned. The default value is true."
        explode: true
        in: query
        name: includeOld
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getChanges_200_response"
          description: OK
      summary: Get audit logs for an account
      tags:
      - management
