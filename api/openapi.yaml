          default: null
        campaignEligibility:
          description: "A list of campaigns and their evaluation status for the current\
            \ customer session.\n\n**Note**:\n\n- This response can **only** be included\
            \ if the `dry` parameter in the query is set to `true`. \n- Do not include\
            \ `triggeredCampaigns` or `ruleFailureReasons` in `responseContent` to\
            \ avoid duplicate results.\n"
          items:
            $ref: "#/components/schemas/CampaignEligibility"
          type: array
          default: null
        effects:
          description: "The effects generated by the rules in your running campaigns.\
            \ See [API effects](https://docs.talon.one/docs/dev/integration-api/api-effects)."
          items:
            $ref: "#/components/schemas/Effect"
          type: array
          default: null
        ruleFailureReasons:
